<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>SSRM-3D Affective Control Trace</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101211;
      --panel: #171b1a;
      --line: rgba(239, 244, 241, 0.15);
      --text: #eff4f1;
      --muted: #a9b4ae;
      --fear: #f07167;
      --stress: #e8c860;
      --trust: #7fc7f2;
      --frustration: #f39c63;
      --affiliation: #83d18a;
      --curiosity: #6fd1c1;
      --guilt: #bd9ff2;
      --attention: #9ab7ff;
      --memory: #d9c36e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 430px;
    }

    canvas {
      width: 100%;
      height: 100vh;
      display: block;
      background: #0b0f0d;
    }

    aside {
      max-height: 100vh;
      overflow: auto;
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 18px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 22px;
      line-height: 1.15;
    }

    h2 {
      font-size: 14px;
    }

    p,
    .event,
    .outcome-row,
    .verdict-row {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.42;
    }

    button {
      border: 1px solid var(--line);
      color: var(--text);
      background: #202624;
      height: 32px;
      padding: 0 10px;
      font: inherit;
      cursor: pointer;
    }

    input[type="range"] {
      width: 100%;
    }

    .section {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      display: grid;
      gap: 8px;
    }

    .controls {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      padding: 8px;
      min-height: 58px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row {
      display: grid;
      grid-template-columns: 126px minmax(0, 1fr) 48px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .bar {
      height: 10px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0;
    }

    .event {
      border-left: 3px solid var(--line);
      padding-left: 8px;
    }

    .outcome-row,
    .verdict-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      border-top: 1px solid rgba(239, 244, 241, 0.08);
      padding-top: 6px;
    }

    .verdict-row {
      grid-template-columns: 10px minmax(0, 1fr) auto;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .value {
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 940px) {
      body {
        grid-template-columns: 1fr;
      }

      canvas {
        height: 58vh;
      }

      aside {
        max-height: none;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <aside>
    <header>
      <h1>SSRM-3D Affective Control</h1>
      <p id="subtitle">Loading trace...</p>
    </header>

    <div class="controls">
      <button id="play" type="button">Pause</button>
      <input id="scrub" type="range" min="0" max="0" value="0">
    </div>

    <section class="metrics">
      <div class="metric"><span>Tick</span><strong id="tick">0</strong></div>
      <div class="metric"><span>Action</span><strong id="action">-</strong></div>
      <div class="metric"><span>Progress</span><strong id="progress">0.00</strong></div>
      <div class="metric"><span>Social</span><strong id="social">0.00</strong></div>
    </section>

    <section class="section" id="bars"></section>

    <section class="section">
      <h2>Recent Events</h2>
      <div id="events"></div>
    </section>

    <section class="section">
      <h2>Ablation Outcomes</h2>
      <div id="outcomes"></div>
    </section>

    <section class="section">
      <h2>Verdict Rows</h2>
      <div id="verdicts"></div>
    </section>
  </aside>

  <script src="../artifacts/ssrm_3d_affective_control_trace.js"></script>
  <script src="../artifacts/ssrm_3d_affective_control_results.js"></script>
  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const subtitle = document.getElementById("subtitle");
    const playButton = document.getElementById("play");
    const scrub = document.getElementById("scrub");
    const fields = {
      tick: document.getElementById("tick"),
      action: document.getElementById("action"),
      progress: document.getElementById("progress"),
      social: document.getElementById("social"),
      bars: document.getElementById("bars"),
      events: document.getElementById("events"),
      outcomes: document.getElementById("outcomes"),
      verdicts: document.getElementById("verdicts"),
    };
    const css = getComputedStyle(document.documentElement);
    const colors = {
      text: css.getPropertyValue("--text").trim(),
      muted: css.getPropertyValue("--muted").trim(),
      fear: css.getPropertyValue("--fear").trim(),
      stress: css.getPropertyValue("--stress").trim(),
      trust: css.getPropertyValue("--trust").trim(),
      frustration: css.getPropertyValue("--frustration").trim(),
      affiliation: css.getPropertyValue("--affiliation").trim(),
      curiosity: css.getPropertyValue("--curiosity").trim(),
      guilt: css.getPropertyValue("--guilt").trim(),
      attention: css.getPropertyValue("--attention").trim(),
      memory: css.getPropertyValue("--memory").trim(),
    };

    const barDefs = [
      ["energy", "Energy", "var(--affiliation)"],
      ["integrity", "Integrity", "var(--curiosity)"],
      ["fear_state", "Fear Control", "var(--fear)"],
      ["stress_state", "Stress", "var(--stress)"],
      ["trust_state", "Trust", "var(--trust)"],
      ["frustration_state", "Frustration", "var(--frustration)"],
      ["affiliation_state", "Affiliation", "var(--affiliation)"],
      ["curiosity_state", "Curiosity", "var(--curiosity)"],
      ["guilt_state", "Guilt Analogue", "var(--guilt)"],
      ["attention_focus", "Attention", "var(--attention)"],
      ["memory_salience", "Memory", "var(--memory)"],
      ["risk_tolerance", "Risk Tol.", "var(--fear)"],
      ["uncertainty", "Uncertainty", "var(--frustration)"],
      ["social_access", "Social Access", "var(--trust)"],
      ["commitment_standing", "Commitment", "var(--guilt)"],
    ];

    const spokes = [
      ["fear_state", "fear", colors.fear],
      ["stress_state", "stress", colors.stress],
      ["trust_state", "trust", colors.trust],
      ["frustration_state", "frustration", colors.frustration],
      ["affiliation_state", "affiliation", colors.affiliation],
      ["curiosity_state", "curiosity", colors.curiosity],
      ["guilt_state", "guilt", colors.guilt],
    ];

    let trace = null;
    let results = null;
    let index = 0;
    let playing = true;
    let lastTime = 0;

    function clamp(value, low, high) {
      return Math.max(low, Math.min(high, value));
    }

    function format(value, digits = 2) {
      return Number(value || 0).toFixed(digits);
    }

    async function loadData() {
      trace = window.SSRM_3D_AFFECTIVE_CONTROL_TRACE;
      results = window.SSRM_3D_AFFECTIVE_CONTROL_RESULTS;
      if (!trace) {
        const response = await fetch("../artifacts/ssrm_3d_affective_control_trace.json");
        trace = await response.json();
      }
      if (!results) {
        const response = await fetch("../artifacts/ssrm_3d_affective_control_results.json");
        results = await response.json();
      }
      if (!trace || !trace.frames || trace.frames.length === 0) {
        throw new Error("trace has no frames");
      }
      scrub.max = String(trace.frames.length - 1);
      subtitle.textContent = `${trace.scenario.name} / ${trace.policy.name}`;
      renderStaticPanels();
      resize();
      requestAnimationFrame(tick);
    }

    function renderStaticPanels() {
      fields.bars.innerHTML = barDefs.map(([key, label, color]) => `
        <div class="row">
          <span>${label}</span>
          <div class="bar"><span id="bar-${key}" style="background:${color}"></span></div>
          <span class="value" id="value-${key}">0.00</span>
        </div>
      `).join("");

      const outcomes = trace.condition_outcomes || {};
      const keyRows = [
        "full_control",
        "no_frustration_control",
        "no_curiosity_control",
        "no_attention_mixing",
        "no_memory_salience",
        "no_risk_modulation",
        "reactive_no_affect",
      ];
      const fullReward = outcomes.full_control ? outcomes.full_control.mean_reward : 0;
      fields.outcomes.innerHTML = keyRows
        .filter((key) => outcomes[key])
        .map((key) => {
          const row = outcomes[key];
          const loss = fullReward - row.mean_reward;
          const miss = row.mean_affect_misses || 0;
          return `
            <div class="outcome-row">
              <span>${key}<br><span class="value">${format(miss, 1)} affect misses</span></span>
              <span class="value">${format(loss, 1)}</span>
            </div>
          `;
        }).join("");

      fields.verdicts.innerHTML = (results.verdict || []).map((row) => `
        <div class="verdict-row">
          <span class="dot" style="background:${row.supports_affective_control_precursor ? "var(--affiliation)" : "var(--fear)"}"></span>
          <span>${row.scenario_name}<br><span class="value">${row.selected_policy}</span></span>
          <span class="value">${row.supports_affective_control_precursor ? "pass" : "fail"}</span>
        </div>
      `).join("");
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    function drawSpoke(centerX, centerY, radius, angle, color, value) {
      const outerX = centerX + Math.cos(angle) * radius;
      const outerY = centerY + Math.sin(angle) * radius;
      const innerRadius = 58;
      const activeRadius = innerRadius + (radius - innerRadius) * clamp(value, 0, 1);
      const activeX = centerX + Math.cos(angle) * activeRadius;
      const activeY = centerY + Math.sin(angle) * activeRadius;

      ctx.strokeStyle = "rgba(239, 244, 241, 0.12)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(outerX, outerY);
      ctx.stroke();

      ctx.strokeStyle = color;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(activeX, activeY);
      ctx.stroke();

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(activeX, activeY, 7, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawSpokeLabel(centerX, centerY, radius, angle, label, color) {
      const labelX = centerX + Math.cos(angle) * (radius + 58);
      const labelY = centerY + Math.sin(angle) * (radius + 58);
      ctx.fillStyle = colors.text;
      ctx.font = "12px Inter, sans-serif";
      ctx.textAlign = Math.cos(angle) > 0.2 ? "left" : Math.cos(angle) < -0.2 ? "right" : "center";
      ctx.fillText(label, labelX, labelY);
    }

    function draw() {
      if (!trace) return;
      const frame = trace.frames[index] || trace.frames[0];
      const rect = canvas.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;
      ctx.clearRect(0, 0, width, height);

      const centerX = width * 0.50;
      const centerY = height * 0.52;
      const radius = Math.min(width, height) * 0.28;

      ctx.strokeStyle = "rgba(239, 244, 241, 0.08)";
      ctx.lineWidth = 1;
      for (let ring = 1; ring <= 4; ring += 1) {
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius * ring / 4, 0, Math.PI * 2);
        ctx.stroke();
      }

      spokes.forEach(([key, label, color], spokeIndex) => {
        const angle = -Math.PI / 2 + spokeIndex * Math.PI * 2 / spokes.length;
        drawSpoke(centerX, centerY, radius, angle, color, frame[key] || 0);
      });

      const attention = clamp(frame.attention_focus || 0, 0, 1);
      const memory = clamp(frame.memory_salience || 0, 0, 1);
      const uncertainty = clamp(frame.uncertainty || 0, 0, 1);
      ctx.strokeStyle = colors.attention;
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius + 18, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * attention);
      ctx.stroke();

      ctx.strokeStyle = colors.memory;
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius + 31, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * memory);
      ctx.stroke();

      ctx.strokeStyle = colors.frustration;
      ctx.globalAlpha = 0.75;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius + 43, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * uncertainty);
      ctx.stroke();
      ctx.globalAlpha = 1;

      const social = clamp(frame.social_access || 0, 0, 1);
      const commitment = clamp(frame.commitment_standing || 0, 0, 1);
      ctx.fillStyle = "rgba(131, 209, 138, 0.16)";
      ctx.strokeStyle = colors.affiliation;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(centerX, centerY, 40 + social * 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.strokeStyle = colors.guilt;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(centerX, centerY, 30, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * commitment);
      ctx.stroke();

      ctx.fillStyle = colors.text;
      ctx.font = "13px Inter, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("control state", centerX, centerY + 4);

      spokes.forEach(([, label, color], spokeIndex) => {
        const angle = -Math.PI / 2 + spokeIndex * Math.PI * 2 / spokes.length;
        drawSpokeLabel(centerX, centerY, radius, angle, label, color);
      });

      ctx.fillStyle = "rgba(239, 244, 241, 0.75)";
      ctx.font = "12px Inter, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(`attention ${format(frame.attention_focus)}`, 24, 32);
      ctx.fillText(`memory ${format(frame.memory_salience)}`, 24, 52);
      ctx.fillText(`uncertainty ${format(frame.uncertainty)}`, 24, 72);
    }

    function updatePanel() {
      const frame = trace.frames[index] || trace.frames[0];
      fields.tick.textContent = frame.tick;
      fields.action.textContent = frame.action;
      fields.progress.textContent = format(frame.progress);
      fields.social.textContent = format(frame.social_access);
      for (const [key] of barDefs) {
        const value = clamp(frame[key] || 0, 0, 1);
        const bar = document.getElementById(`bar-${key}`);
        const text = document.getElementById(`value-${key}`);
        if (bar) bar.style.width = `${value * 100}%`;
        if (text) text.textContent = format(value);
      }
      const notes = frame.notes && frame.notes.length ? frame.notes : ["no salient event"];
      fields.events.innerHTML = notes.slice(-4).map((note) => `<div class="event">${note}</div>`).join("");
      scrub.value = String(index);
    }

    function tick(time) {
      if (playing && time - lastTime > 95) {
        index = (index + 1) % trace.frames.length;
        lastTime = time;
        updatePanel();
        draw();
      }
      requestAnimationFrame(tick);
    }

    playButton.addEventListener("click", () => {
      playing = !playing;
      playButton.textContent = playing ? "Pause" : "Play";
    });

    scrub.addEventListener("input", () => {
      index = Number(scrub.value);
      updatePanel();
      draw();
    });

    window.addEventListener("resize", resize);

    loadData()
      .then(() => {
        updatePanel();
        draw();
      })
      .catch((error) => {
        subtitle.textContent = `Could not load trace: ${error.message}`;
        console.error(error);
      });
  </script>
</body>
</html>
