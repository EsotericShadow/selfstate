<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>SSRM-3D Day/Night Sleep-Rest Trace</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101312;
      --panel: #171b1a;
      --line: rgba(241, 245, 239, 0.15);
      --text: #f1f5ef;
      --muted: #a9b2ad;
      --sun: #f2c85b;
      --night: #6fa8ff;
      --self: #7edc93;
      --risk: #ff7d68;
      --tool: #f0d36e;
      --social: #c8a1ff;
      --shelter: #8fd3c7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 430px;
    }

    canvas {
      width: 100%;
      height: 100vh;
      display: block;
      background: #0b1010;
    }

    aside {
      max-height: 100vh;
      overflow: auto;
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 18px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 22px;
      line-height: 1.15;
    }

    h2 {
      font-size: 14px;
    }

    p,
    .meta,
    .event,
    .outcome-row,
    .verdict-row {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.42;
    }

    button {
      border: 1px solid var(--line);
      color: var(--text);
      background: #202625;
      height: 32px;
      padding: 0 10px;
      font: inherit;
      cursor: pointer;
    }

    input[type="range"] {
      width: 100%;
    }

    .section {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      display: grid;
      gap: 8px;
    }

    .controls {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      padding: 8px;
      min-height: 58px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 18px;
    }

    .bar {
      height: 10px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0;
    }

    .row {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) 44px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .event {
      border-left: 3px solid var(--line);
      padding-left: 8px;
    }

    .outcome-row,
    .verdict-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      border-top: 1px solid rgba(241, 245, 239, 0.08);
      padding-top: 6px;
    }

    .verdict-row {
      grid-template-columns: 10px minmax(0, 1fr) auto;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .pill {
      border: 1px solid var(--line);
      padding: 2px 6px;
      color: var(--text);
      white-space: nowrap;
    }

    .value {
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 940px) {
      body {
        grid-template-columns: 1fr;
      }

      canvas {
        height: 58vh;
      }

      aside {
        max-height: none;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <aside>
    <header>
      <h1>SSRM-3D Day/Night Sleep-Rest</h1>
      <p id="subtitle">Loading trace...</p>
    </header>

    <div class="controls">
      <button id="play" type="button">Pause</button>
      <input id="scrubber" type="range" min="0" max="0" value="0" aria-label="Trace frame">
    </div>

    <div class="section">
      <h2>State</h2>
      <div class="metrics">
        <div class="metric"><span>tick</span><strong id="tick">0</strong></div>
        <div class="metric"><span>phase</span><strong id="phase">day</strong></div>
        <div class="metric"><span>action</span><strong id="action">none</strong></div>
        <div class="metric"><span>vulnerability</span><strong id="vulnerability">0.00</strong></div>
      </div>
    </div>

    <div class="section">
      <h2>Control Variables</h2>
      <div class="row"><span>light</span><div class="bar"><span id="lightBar" style="background:var(--sun)"></span></div><span id="lightText" class="value">0.00</span></div>
      <div class="row"><span>fatigue</span><div class="bar"><span id="fatigueBar" style="background:var(--self)"></span></div><span id="fatigueText" class="value">0.00</span></div>
      <div class="row"><span>damage</span><div class="bar"><span id="damageBar" style="background:var(--risk)"></span></div><span id="damageText" class="value">0.00</span></div>
      <div class="row"><span>progress</span><div class="bar"><span id="progressBar" style="background:var(--night)"></span></div><span id="progressText" class="value">0.0</span></div>
    </div>

    <div class="section">
      <h2>Rest Context</h2>
      <div id="events"></div>
    </div>

    <div class="section">
      <h2>Ablation Outcomes</h2>
      <div id="outcomes"></div>
    </div>

    <div class="section">
      <h2>Verdicts</h2>
      <div id="verdicts"></div>
    </div>
  </aside>

  <script src="../artifacts/ssrm_3d_day_night_sleep_trace.js"></script>
  <script src="../artifacts/ssrm_3d_day_night_sleep_results.js"></script>
  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const scrubber = document.getElementById("scrubber");
    const playButton = document.getElementById("play");
    let trace = null;
    let results = null;
    let frameIndex = 0;
    let playing = true;

    function resize() {
      const ratio = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(canvas.clientWidth * ratio);
      canvas.height = Math.floor(canvas.clientHeight * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      draw();
    }

    function mixColor(dayColor, nightColor, amount) {
      const day = dayColor.match(/\w\w/g).map((part) => parseInt(part, 16));
      const night = nightColor.match(/\w\w/g).map((part) => parseInt(part, 16));
      const mixed = day.map((value, index) => Math.round(value * amount + night[index] * (1 - amount)));
      return `rgb(${mixed[0]}, ${mixed[1]}, ${mixed[2]})`;
    }

    function drawShelter(x, y, scale) {
      ctx.fillStyle = "#243533";
      ctx.fillRect(x - scale * 0.7, y - scale * 0.35, scale * 1.4, scale * 0.9);
      ctx.fillStyle = "#8fd3c7";
      ctx.beginPath();
      ctx.moveTo(x - scale * 0.9, y - scale * 0.35);
      ctx.lineTo(x, y - scale * 1.0);
      ctx.lineTo(x + scale * 0.9, y - scale * 0.35);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#111817";
      ctx.fillRect(x - scale * 0.18, y + scale * 0.05, scale * 0.36, scale * 0.5);
    }

    function draw() {
      if (!trace || !trace.frames.length) return;
      const frame = trace.frames[frameIndex];
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const light = Math.max(0, Math.min(1, frame.light_level));
      const sky = mixColor("263b46", "090d19", light);
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      const horizon = h * 0.62;
      ctx.fillStyle = frame.is_night ? "#111c1a" : "#20342d";
      ctx.fillRect(0, horizon, w, h - horizon);

      const bodyX = w * 0.48;
      const bodyY = horizon - 28;
      const shelterX = w * 0.74;
      const shelterY = horizon - 22;
      drawShelter(shelterX, shelterY, Math.min(w, h) * 0.055);

      const orbX = w * (0.16 + 0.68 * (frame.tick / Math.max(1, trace.frames[trace.frames.length - 1].tick)));
      const orbY = h * (frame.is_night ? 0.20 : 0.16);
      ctx.fillStyle = frame.is_night ? "#d8e6ff" : "#f2c85b";
      ctx.beginPath();
      ctx.arc(orbX, orbY, frame.is_night ? 12 : 18, 0, Math.PI * 2);
      ctx.fill();

      const riskRadius = 36 + frame.vulnerability * 140;
      ctx.strokeStyle = `rgba(255,125,104,${0.18 + frame.vulnerability * 0.45})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(bodyX, bodyY, riskRadius, 0, Math.PI * 2);
      ctx.stroke();

      if (frame.alarm_ready) {
        ctx.strokeStyle = "#f0d36e";
        ctx.lineWidth = 2;
        for (let index = 1; index <= 3; index += 1) {
          ctx.beginPath();
          ctx.arc(shelterX, shelterY, 22 * index, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      if (frame.social_watch_ready) {
        ctx.fillStyle = "#c8a1ff";
        ctx.beginPath();
        ctx.arc(bodyX - 42, bodyY + 6, 10, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = frame.at_shelter ? "#8fd3c7" : "#f1f5ef";
      ctx.beginPath();
      ctx.arc(bodyX, bodyY, 13, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#f1f5ef";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(bodyX, bodyY + 14);
      ctx.lineTo(bodyX, bodyY + 40);
      ctx.moveTo(bodyX - 18, bodyY + 25);
      ctx.lineTo(bodyX + 18, bodyY + 25);
      ctx.stroke();

      const fatigueHeight = Math.min(140, frame.fatigue * 140);
      ctx.fillStyle = "rgba(126,220,147,0.24)";
      ctx.fillRect(28, horizon - fatigueHeight, 20, fatigueHeight);
      ctx.strokeStyle = "#7edc93";
      ctx.strokeRect(28, horizon - 140, 20, 140);

      ctx.fillStyle = "rgba(241,245,239,0.92)";
      ctx.font = "20px Inter, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(trace.scenario.name, 28, 38);
      ctx.fillStyle = "rgba(169,178,173,0.95)";
      ctx.font = "14px Inter, system-ui, sans-serif";
      ctx.fillText(`policy: ${trace.policy.name}`, 28, 62);
    }

    function updateEvents(frame) {
      const entries = [
        ["shelter", frame.at_shelter ? "ready" : "not reached", "var(--shelter)"],
        ["alarm", frame.alarm_ready ? "armed" : "off", "var(--tool)"],
        ["watch", frame.social_watch_ready ? "guarding" : "none", "var(--social)"],
        ["continuity", `${frame.continuity_resets} reset(s)`, "var(--night)"],
        ["commitment", frame.commitment_active ? "active" : "inactive", "var(--text)"],
      ];
      const container = document.getElementById("events");
      container.innerHTML = "";
      entries.forEach(([label, value, color]) => {
        const node = document.createElement("div");
        node.className = "event";
        node.style.borderLeftColor = color;
        node.innerHTML = `<strong style="color:${color}">${label}</strong>: ${value}`;
        container.appendChild(node);
      });
    }

    function updateOutcomes() {
      const container = document.getElementById("outcomes");
      container.innerHTML = "";
      Object.entries(trace.condition_outcomes).forEach(([condition, outcome]) => {
        const row = document.createElement("div");
        row.className = "outcome-row";
        row.innerHTML = `<span>${condition}</span><span class="value">${outcome.mean_reward.toFixed(1)}</span>`;
        container.appendChild(row);
      });
    }

    function updateVerdicts() {
      const container = document.getElementById("verdicts");
      container.innerHTML = "";
      if (!results || !results.verdict) return;
      results.verdict.forEach((row) => {
        const node = document.createElement("div");
        node.className = "verdict-row";
        const color = row.supports_day_night_sleep_precursor ? "#7edc93" : "#ff7d68";
        node.innerHTML = `<span class="dot" style="background:${color}"></span><span>${row.scenario_name}</span><span class="pill">${row.no_rest_loss.toFixed(1)}</span>`;
        container.appendChild(node);
      });
    }

    function setBar(id, textId, value, labelValue = null) {
      const safe = Math.max(0, Math.min(1, value));
      document.getElementById(id).style.width = `${safe * 100}%`;
      document.getElementById(textId).textContent = labelValue === null ? safe.toFixed(2) : labelValue;
    }

    function updatePanel() {
      if (!trace || !trace.frames.length) return;
      const frame = trace.frames[frameIndex];
      document.getElementById("subtitle").textContent = trace.scenario.pressure;
      document.getElementById("tick").textContent = String(frame.tick);
      document.getElementById("phase").textContent = frame.is_night ? "night" : "day";
      document.getElementById("action").textContent = frame.action;
      document.getElementById("vulnerability").textContent = Number(frame.vulnerability).toFixed(2);
      setBar("lightBar", "lightText", frame.light_level);
      setBar("fatigueBar", "fatigueText", frame.fatigue);
      setBar("damageBar", "damageText", frame.hazard_damage);
      setBar("progressBar", "progressText", Math.min(1, frame.progress / 90), Number(frame.progress).toFixed(1));
      updateEvents(frame);
      scrubber.value = String(frameIndex);
      draw();
    }

    function tick() {
      if (playing && trace && trace.frames.length) {
        frameIndex = (frameIndex + 1) % trace.frames.length;
        updatePanel();
      }
      window.setTimeout(tick, 850);
    }

    scrubber.addEventListener("input", () => {
      frameIndex = Number(scrubber.value);
      updatePanel();
    });

    playButton.addEventListener("click", () => {
      playing = !playing;
      playButton.textContent = playing ? "Pause" : "Play";
    });

    window.addEventListener("resize", resize);

    function hydrate(traceData, resultData) {
      trace = traceData;
      results = resultData;
      scrubber.max = String(Math.max(0, trace.frames.length - 1));
      updateOutcomes();
      updateVerdicts();
      resize();
      updatePanel();
      tick();
    }

    function loadJson(path) {
      return fetch(path).then((response) => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
      });
    }

    Promise.all([
      loadJson("../artifacts/ssrm_3d_day_night_sleep_trace.json"),
      loadJson("../artifacts/ssrm_3d_day_night_sleep_results.json"),
    ]).then(([traceData, resultData]) => {
      hydrate(traceData, resultData);
    }).catch((error) => {
      if (window.SSRM_3D_DAY_NIGHT_SLEEP_TRACE && window.SSRM_3D_DAY_NIGHT_SLEEP_RESULTS) {
        hydrate(window.SSRM_3D_DAY_NIGHT_SLEEP_TRACE, window.SSRM_3D_DAY_NIGHT_SLEEP_RESULTS);
        return;
      }
      document.getElementById("subtitle").textContent =
        `Could not load trace. Run \`python3 -m http.server 8765\` from the repo root and open /visualizations/ssrm_3d_day_night_sleep.html. Error: ${error.message}`;
    });
  </script>
</body>
</html>
