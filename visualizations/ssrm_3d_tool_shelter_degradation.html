<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>SSRM-3D Tool/Shelter Degradation Trace</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101211;
      --panel: #171b19;
      --line: rgba(239, 244, 238, 0.15);
      --text: #eff4ee;
      --muted: #a9b4ad;
      --tool: #7bc8ff;
      --shelter: #8bd2a1;
      --parts: #f0c86d;
      --risk: #ff746d;
      --resource: #c7a8ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 430px;
    }

    canvas {
      width: 100%;
      height: 100vh;
      display: block;
      background: #0a0f0d;
    }

    aside {
      max-height: 100vh;
      overflow: auto;
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 18px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 22px;
      line-height: 1.15;
    }

    h2 {
      font-size: 14px;
    }

    p,
    .event,
    .outcome-row,
    .verdict-row {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.42;
    }

    button {
      border: 1px solid var(--line);
      color: var(--text);
      background: #202521;
      height: 32px;
      padding: 0 10px;
      font: inherit;
      cursor: pointer;
    }

    input[type="range"] {
      width: 100%;
    }

    .section {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      display: grid;
      gap: 8px;
    }

    .controls {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      padding: 8px;
      min-height: 58px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 18px;
    }

    .row {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr) 48px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .bar {
      height: 10px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0;
    }

    .event {
      border-left: 3px solid var(--line);
      padding-left: 8px;
    }

    .outcome-row,
    .verdict-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      border-top: 1px solid rgba(239, 244, 238, 0.08);
      padding-top: 6px;
    }

    .verdict-row {
      grid-template-columns: 10px minmax(0, 1fr) auto;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .pill {
      border: 1px solid var(--line);
      padding: 2px 6px;
      color: var(--text);
      white-space: nowrap;
    }

    .value {
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 940px) {
      body {
        grid-template-columns: 1fr;
      }

      canvas {
        height: 58vh;
      }

      aside {
        max-height: none;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <aside>
    <header>
      <h1>SSRM-3D Tool/Shelter Degradation</h1>
      <p id="subtitle">Loading trace...</p>
    </header>

    <div class="controls">
      <button id="play" type="button">Pause</button>
      <input id="scrub" type="range" min="0" max="0" value="0">
    </div>

    <div class="metrics">
      <div class="metric"><span>tick</span><strong id="tick">0</strong></div>
      <div class="metric"><span>action</span><strong id="action">-</strong></div>
      <div class="metric"><span>alarm failures</span><strong id="alarms">0</strong></div>
      <div class="metric"><span>cache failures</span><strong id="caches">0</strong></div>
    </div>

    <div class="section" id="bars"></div>

    <div class="section">
      <h2>Trace Event</h2>
      <p class="event" id="event">Waiting for trace.</p>
    </div>

    <div class="section">
      <h2>Ablation Outcomes</h2>
      <div id="outcomes"></div>
    </div>

    <div class="section">
      <h2>Verdicts</h2>
      <div id="verdicts"></div>
    </div>
  </aside>

  <script src="../artifacts/ssrm_3d_tool_shelter_degradation_trace.js"></script>
  <script src="../artifacts/ssrm_3d_tool_shelter_degradation_results.js"></script>
  <script>
    const state = {
      trace: window.SSRM_3D_TOOL_SHELTER_DEGRADATION_TRACE || null,
      results: window.SSRM_3D_TOOL_SHELTER_DEGRADATION_RESULTS || null,
      frameIndex: 0,
      playing: true,
      lastStep: 0,
    };

    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const playButton = document.getElementById("play");
    const scrub = document.getElementById("scrub");
    const bars = document.getElementById("bars");

    const barDefs = [
      ["tool_integrity", "Tool integrity", "var(--tool)"],
      ["shelter_quality", "Shelter quality", "var(--shelter)"],
      ["spare_parts", "Spare parts", "var(--parts)", 3],
      ["exposure_debt", "Exposure", "var(--risk)"],
      ["resource_loss", "Resource loss", "var(--resource)"],
      ["route_confusion", "Route confusion", "var(--risk)"],
    ];

    function fallbackLoad() {
      const tracePromise = state.trace ? Promise.resolve(state.trace) : fetch("../artifacts/ssrm_3d_tool_shelter_degradation_trace.json").then((response) => response.json());
      const resultPromise = state.results ? Promise.resolve(state.results) : fetch("../artifacts/ssrm_3d_tool_shelter_degradation_results.json").then((response) => response.json());
      return Promise.all([tracePromise, resultPromise]).then(([trace, results]) => {
        state.trace = trace;
        state.results = results;
      });
    }

    function cssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function resizeCanvas() {
      const ratio = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(1, Math.floor(rect.width * ratio));
      canvas.height = Math.max(1, Math.floor(rect.height * ratio));
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function setupBars() {
      bars.innerHTML = "";
      for (const [key, label, color] of barDefs) {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `<span>${label}</span><div class="bar"><span id="bar-${key}"></span></div><span class="value" id="value-${key}">0.00</span>`;
        row.querySelector(".bar > span").style.background = color;
        bars.appendChild(row);
      }
    }

    function setBar(key, value, scale = 1) {
      const raw = Number(value) || 0;
      const clamped = Math.max(0, Math.min(1, raw / scale));
      document.getElementById(`bar-${key}`).style.width = `${clamped * 100}%`;
      document.getElementById(`value-${key}`).textContent = raw.toFixed(2);
    }

    function drawCracks(x, y, width, height, amount) {
      ctx.strokeStyle = `rgba(255, 116, 109, ${0.15 + amount * 0.45})`;
      ctx.lineWidth = 1.5;
      const count = Math.floor(2 + amount * 8);
      for (let i = 0; i < count; i += 1) {
        const px = x + 10 + ((i * 31) % Math.max(12, width - 20));
        const py = y + 12 + ((i * 23) % Math.max(12, height - 20));
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px + 8, py + 13);
        ctx.lineTo(px + 3, py + 22);
        ctx.stroke();
      }
    }

    function drawScene(frame) {
      const rect = canvas.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;
      ctx.clearRect(0, 0, width, height);

      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, "#10181a");
      gradient.addColorStop(1, "#111b15");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = "#17241b";
      ctx.fillRect(0, height * 0.68, width, height * 0.32);

      const groundY = height * 0.72;
      const shelterX = width * 0.63;
      const shelterY = groundY - 82;
      const toolX = width * 0.30;
      const cacheX = width * 0.43;
      const agentX = width * 0.52;
      const agentY = groundY - 26;
      const shelterWear = 1 - frame.shelter_quality;
      const toolWear = 1 - frame.tool_integrity;

      ctx.strokeStyle = "rgba(239, 244, 238, 0.14)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(width * 0.20, groundY + 20);
      ctx.bezierCurveTo(width * 0.35, groundY - 8, width * 0.52, groundY + 10, width * 0.74, groundY - 8);
      ctx.stroke();

      ctx.fillStyle = "#273532";
      ctx.fillRect(shelterX - 60, shelterY + 38, 120, 76);
      ctx.fillStyle = cssVar("--shelter");
      ctx.globalAlpha = 0.26 + frame.shelter_quality * 0.50;
      ctx.fillRect(shelterX - 52, shelterY + 46, 104, 62);
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#3b4542";
      ctx.beginPath();
      ctx.moveTo(shelterX - 72, shelterY + 42);
      ctx.lineTo(shelterX, shelterY - 18);
      ctx.lineTo(shelterX + 72, shelterY + 42);
      ctx.closePath();
      ctx.fill();
      drawCracks(shelterX - 58, shelterY + 42, 116, 72, shelterWear);

      ctx.strokeStyle = cssVar("--tool");
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(toolX, groundY - 70);
      ctx.lineTo(toolX, groundY - 6);
      ctx.stroke();
      ctx.fillStyle = cssVar("--tool");
      ctx.globalAlpha = 0.28 + frame.tool_integrity * 0.65;
      ctx.beginPath();
      ctx.arc(toolX, groundY - 76, 22, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      drawCracks(toolX - 24, groundY - 100, 48, 48, toolWear);

      ctx.fillStyle = cssVar("--resource");
      ctx.globalAlpha = 0.26 + Math.max(0, 1 - frame.resource_loss) * 0.40;
      ctx.fillRect(cacheX - 30, groundY - 36, 60, 34);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = "rgba(239, 244, 238, 0.30)";
      ctx.strokeRect(cacheX - 30, groundY - 36, 60, 34);

      const partCount = Math.min(5, Math.round(frame.spare_parts * 2));
      ctx.fillStyle = cssVar("--parts");
      for (let i = 0; i < partCount; i += 1) {
        ctx.fillRect(cacheX - 26 + i * 11, groundY + 8, 8, 8);
      }

      ctx.strokeStyle = cssVar("--risk");
      ctx.globalAlpha = 0.16 + frame.collapse_risk * 0.45;
      ctx.lineWidth = 18 + frame.collapse_risk * 30;
      ctx.beginPath();
      ctx.arc(agentX, agentY, 26, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;

      ctx.fillStyle = cssVar("--text");
      ctx.beginPath();
      ctx.arc(agentX, agentY, 13, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = frame.action.includes("repair") ? cssVar("--parts") : cssVar("--risk");
      ctx.beginPath();
      ctx.arc(agentX + 5, agentY - 4, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = cssVar("--muted");
      ctx.font = "12px Inter, sans-serif";
      ctx.fillText("marker / alarm", toolX - 36, groundY - 112);
      ctx.fillText("cache", cacheX - 15, groundY - 48);
      ctx.fillText("shelter", shelterX - 22, shelterY - 28);
    }

    function renderOutcomes() {
      const container = document.getElementById("outcomes");
      const outcomes = state.trace.condition_outcomes || {};
      const rows = Object.entries(outcomes)
        .sort((a, b) => (b[1].mean_reward || 0) - (a[1].mean_reward || 0))
        .slice(0, 7);
      container.innerHTML = "";
      for (const [name, row] of rows) {
        const div = document.createElement("div");
        div.className = "outcome-row";
        div.innerHTML = `<span>${name}</span><span class="value">${Number(row.mean_reward).toFixed(1)}</span>`;
        container.appendChild(div);
      }
    }

    function renderVerdicts() {
      const container = document.getElementById("verdicts");
      container.innerHTML = "";
      for (const row of state.results.verdict || []) {
        const div = document.createElement("div");
        div.className = "verdict-row";
        const ok = row.supports_tool_shelter_degradation_precursor;
        div.innerHTML = `<span class="dot" style="background:${ok ? "var(--shelter)" : "var(--risk)"}"></span><span>${row.scenario_name}</span><span class="pill">${ok ? "pass" : "fail"}</span>`;
        container.appendChild(div);
      }
    }

    function renderFrame() {
      if (!state.trace || !state.trace.frames.length) {
        return;
      }
      const frame = state.trace.frames[state.frameIndex];
      scrub.value = String(state.frameIndex);
      document.getElementById("tick").textContent = frame.tick;
      document.getElementById("action").textContent = frame.action.replaceAll("_", " ");
      document.getElementById("alarms").textContent = frame.alarm_failures;
      document.getElementById("caches").textContent = frame.cache_failures;
      for (const [key, , , scale] of barDefs) {
        setBar(key, frame[key], scale || 1);
      }
      document.getElementById("event").textContent = `action=${frame.action}; maintenance_misses=${frame.maintenance_misses}; continuity_resets=${frame.continuity_resets}.`;
      drawScene(frame);
    }

    function step(timestamp) {
      if (state.playing && timestamp - state.lastStep > 170) {
        state.frameIndex = (state.frameIndex + 1) % state.trace.frames.length;
        state.lastStep = timestamp;
        renderFrame();
      }
      requestAnimationFrame(step);
    }

    playButton.addEventListener("click", () => {
      state.playing = !state.playing;
      playButton.textContent = state.playing ? "Pause" : "Play";
    });

    scrub.addEventListener("input", () => {
      state.playing = false;
      playButton.textContent = "Play";
      state.frameIndex = Number(scrub.value);
      renderFrame();
    });

    window.addEventListener("resize", () => {
      resizeCanvas();
      renderFrame();
    });

    fallbackLoad()
      .then(() => {
        document.getElementById("subtitle").textContent = `${state.trace.scenario.name} / ${state.trace.policy.name}`;
        scrub.max = String(state.trace.frames.length - 1);
        setupBars();
        renderOutcomes();
        renderVerdicts();
        resizeCanvas();
        renderFrame();
        requestAnimationFrame(step);
      })
      .catch((error) => {
        document.getElementById("subtitle").textContent = "Could not load trace.";
        document.getElementById("event").textContent = String(error);
      });
  </script>
</body>
</html>
